<!DOCTYPE html>
<html>

<head>

<title>Caldera Fleet Leaderboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat', Arial, sans-serif;
background:#f5f7fb;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

#leaderboard{
max-width:600px;
margin:auto;
}

.truck-card{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
}

.truck-name{
font-weight:600;
}

.truck-distance{
color:#555;
}

.rank{
font-size:22px;
font-weight:700;
width:40px;
display:flex;
align-items:center;
justify-content:center;
}

.truck-info{
flex-grow:1;
padding-left:10px;
}

.emissions{
font-weight:600;
color:#2f7a46;
}

.leader{
border:2px solid #ffd700;
background:#fffdf3;
}

</style>

</head>

<body>

<h1>🚚 Caldera Truck Leaderboard</h1>

<div id="leaderboard"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://auvpithbsrattacwyvdk.supabase.co";
const supabaseKey = "sb_publishable_bbueHwws7C0SaYN04H2klw_5yjboqh8";

const supabaseClient = window.supabase.createClient(
supabaseUrl,
supabaseKey
);


async function loadLeaderboard(){


const { data, error } = await supabaseClient
.from("truck_reports")
.select("*")
.order("distance", { ascending:false });

console.log("Supabase data:", data);
console.log("Supabase error:", error);
  
let html = "";

data.forEach((truck, index) => {

let medal = "";

if(index === 0) medal = "🥇";
else if(index === 1) medal = "🥈";
else if(index === 2) medal = "🥉";

html += `
<div class="truck-card ${index === 0 ? "leader" : ""}">

<div class="rank">
${medal || index+1}
</div>

<div class="truck-info">

<div class="truck-name">${truck.truck_name}</div>

<div class="truck-distance">
${(truck.distance/1000).toFixed(3)} km travelled
</div>

</div>

<div class="emissions">
🌍 ${truck.emissions.toFixed(2)} kg
</div>

</div>
`;

});

document.getElementById("leaderboard").innerHTML = html;

}


loadLeaderboard();

setInterval(loadLeaderboard, 5000);

</script>

</body>

</html>
