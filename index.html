<!DOCTYPE html>
<html>

<head>

<title>Caldera Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<h1>Caldera Tracker</h1>

<p id="truckID"></p>

<div id="status" class="status-off">
Tracking Off
</div>

<div id="map"></div>


<div class="controls">

<button id="startBtn" onclick="startTracking()">
Start Tracking
</button>

<button onclick="generateReport()">
Update Report
</button>

<button id="stopBtn" onclick="stopTracking()">
Stop
</button>

</div>


<div class="report-container">

<button class="report-toggle" onclick="toggleReport()">
Report ▼
</button>

<div id="reportPanel" class="report-panel">

<p><b>Distance:</b> <span id="reportDistance">-</span></p>

<p><b>Idle Time:</b> <span id="reportIdle">-</span></p>

<p><b>Estimated CO₂:</b> <span id="reportEmissions">-</span></p>

</div>

</div>

</div>


<script src="js/script.js"></script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyACfb4lxE3GVOs4i7RVAYfBNQon61X3EVc&libraries=geometry&callback=initMap">
</script>

</body>

</html>
